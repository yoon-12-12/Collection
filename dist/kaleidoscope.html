<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kaleidoscope Gallery</title>
    <style>
        body { 
            margin: 0; background: #0d0d0e; color: white; 
            font-family: sans-serif; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; 
        }
        
        .slider-wrapper {
            position: relative; width: 95vw; max-width: 1400px; height: 85vh; /* 버튼 공간을 위해 높이 살짝 조정 */
            display: flex; align-items: center; overflow: hidden; 
        }

        /* --- 중간 생략 (기존 slider-track, slide-page 등의 CSS와 동일) --- */
        .slider-track { display: flex; transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; }
        .slide-page {
            min-width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; 
            gap: 40px 30px; padding: 30px; box-sizing: border-box; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; margin: 0 10px;
        }
        .item-center-box { position: relative; width: 100%; min-height: 320px; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.04); border-radius: 20px; }
        .palette-stack { position: absolute; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .palette-group { position: absolute; display: flex; width: 100px; height: 36px; border-radius: 3px; overflow: hidden; mix-blend-mode: screen; transform-origin: center center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .color-bar { flex: 1; height: 100%; backdrop-filter: saturate(150%); }
        .original-image { position: absolute; width: 100px; height: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); z-index: 100; transform: translate(calc(-50% - 90px), -50%); left: 50%; top: 50%; border: 1px solid rgba(255,255,255,0.1); object-fit: cover; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .original-image:hover { transform: translate(calc(-50% - 90px), -50%) scale(1.1); box-shadow: 0 8px 25px rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 25px 18px; cursor: pointer; z-index: 1000; border-radius: 15px; backdrop-filter: blur(5px); transition: 0.3s; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.05); }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }
        .pagination { display: flex; gap: 12px; margin-top: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: white; transform: scale(1.5); }

        /* ★ [새로 추가된 BACK TO HOME 버튼 스타일] */
        .back-btn {
            position: absolute;
            top: 20px; /* 화면 상단 고정 */
            left: 30px;
            z-index: 2000;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateX(5px); /* 살짝 오른쪽으로 이동하는 효과 */
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← BACK TO HOME</a>

    <div class="slider-wrapper">
        <button class="nav-btn prev-btn" onclick="moveSlide(-1)">&#10094;</button>
        <div class="slider-track" id="slider-track"></div>
        <button class="nav-btn next-btn" onclick="moveSlide(1)">&#10095;</button>
    </div>
    
    <div class="pagination" id="pagination"></div>

    <script>
        // --- 스크립트 부분은 기존과 동일하므로 유지하시면 됩니다 ---
        const images = [
            'assets/images/kaleidoscope/a.png', 
            'assets/images/kaleidoscope/b.jpg', 
            'assets/images/kaleidoscope/c.jpg', 
            'assets/images/kaleidoscope/d.png', 
            'assets/images/kaleidoscope/e.png', 
            'assets/images/kaleidoscope/f.png', 
            'assets/images/kaleidoscope/g.png', 
            'https://picsum.photos/id/100/400/200', // 추가된 임시 이미지 (ID 100)
            
            'https://picsum.photos/id/10/400/200', 'https://picsum.photos/id/1069/400/200', 'https://picsum.photos/id/1011/400/200',
            'https://picsum.photos/id/1048/400/200', 'https://picsum.photos/id/28/400/200', 'https://picsum.photos/id/54/400/200',
            'https://picsum.photos/id/60/400/200', 'https://picsum.photos/id/65/400/200', 'https://picsum.photos/id/70/400/200',
            'https://picsum.photos/id/75/400/200', 'https://picsum.photos/id/80/400/200', 'https://picsum.photos/id/85/400/200'
        ];

        const RADIUS = 90;
        const track = document.getElementById('slider-track');
        const pagination = document.getElementById('pagination');
        let currentIdx = 0;

        for (let i = 0; i < images.length; i += 6) {
            const pageIdx = i / 6;
            const page = document.createElement('div');
            page.className = 'slide-page';
            
            images.slice(i, i + 6).forEach(url => {
                const centerBox = document.createElement('div');
                centerBox.className = 'item-center-box';
                const stack = document.createElement('div');
                stack.className = 'palette-stack';
                const imgEl = document.createElement('img');
                imgEl.className = 'original-image';
                imgEl.src = url;
                imgEl.crossOrigin = "Anonymous";

                imgEl.onclick = () => {
                    location.href = `original.html?img=${encodeURIComponent(url)}`;
                };

                centerBox.appendChild(stack);
                centerBox.appendChild(imgEl);
                page.appendChild(centerBox);

                imgEl.onload = () => analyzeAndRender(imgEl, stack);
            });
            track.appendChild(page);

            const dot = document.createElement('div');
            dot.className = `dot ${pageIdx === 0 ? 'active' : ''}`;
            dot.id = `dot-${pageIdx}`;
            pagination.appendChild(dot);
        }

        function moveSlide(dir) {
            const totalPages = Math.ceil(images.length / 6);
            currentIdx = Math.max(0, Math.min(currentIdx + dir, totalPages - 1));
            track.style.transform = `translateX(-${currentIdx * 100}%)`;
            document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === currentIdx));
        }

        function getColorDistance(c1, c2) {
            return Math.sqrt(Math.pow(c1.r-c2.r, 2) + Math.pow(c1.g-c2.g, 2) + Math.pow(c1.b-c2.b, 2));
        }

        function analyzeAndRender(imageObj, targetStack) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 40; canvas.height = 20;
            ctx.drawImage(imageObj, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let colors = [];
            for (let i = 0; i < imgData.length; i += 4) {
                colors.push({ r: imgData[i], g: imgData[i+1], b: imgData[i+2] });
            }
            let palette = [];
            colors.forEach(c => {
                let found = palette.find(p => getColorDistance(p, c) < 30);
                if (found) found.count++; else palette.push({ ...c, count: 1 });
            });
            palette.sort((a, b) => b.count - a.count);
            const finalColors = palette.slice(0, 20);

            for (let i = 0; i < 24; i++) {
                const group = document.createElement('div');
                group.className = 'palette-group';
                const angle = (i / 24) * Math.PI * 2;
                const x = RADIUS * Math.cos(angle);
                const y = RADIUS * Math.sin(angle);
                group.style.transform = `translate(${x}px, ${y}px) rotate(${angle * 180 / Math.PI}deg)`;
                finalColors.forEach(c => {
                    const bar = document.createElement('div');
                    bar.className = 'color-bar';
                    bar.style.backgroundColor = `rgba(${c.r}, ${c.g}, ${c.b}, 0.5)`;
                    group.appendChild(bar);
                });
                targetStack.appendChild(group);
            }
        }
    </script>
</body>
</html>
