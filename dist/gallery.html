<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mobile Gallery</title>
    <link rel="stylesheet" href="src/gallery.css">
</head>

<body>
    <div class="background-overlay"></div>
    <a href="index.html" class="back-btn">← BACK TO HOME</a>

    <div class="scene">
        <div class="carousel">
            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone1.jpg');"
                data-title="Project 01" data-desc="이 프로젝트는 온라인 판매 사이트입니다.
-『2025.02 - 2025.06』동안 진행한 프로젝트입니다.
-「PHP, Bootstrap, phpMyAdmin, Notepad++」를 사용하여 만들었습니다.
- 제품 상세 검색 및 구매 / 로그인 기능을 활용하여 제품 구매시 정보 자동입력 및 주문 조회 , 문의가 가능합니다.
- PHP의 기본 개념과 데이터 베이스의 테이블 간의 상호작용에 대해 배웠습니다."></div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone2.jpg');"
                data-title="Project 02" data-desc="이 프로젝트는 Project 01의 관리자 사이트입니다.
-『2025.02 - 2025.06』동안 진행한 프로젝트입니다.
-「PHP, Bootstrap, phpMyAdmin, Notepad++」를 사용하여 만들었습니다.
- 회원,제품,주문 등을 포함한 관리자 권한으로 전반적인 관리가 가능합니다.
- 데이터베이스에 기존 데이터를 기반으로 전송 및 수집하여 활용하는 기능을 배웠습니다."></div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone3.png');"
                data-title="Project 03" data-desc="이 프로젝트는 판매 관리 사이트입니다.
-『2025.08 - 2025.09』동안 진행한 프로젝트입니다.
-「PHP, Bootstrap, phpMyAdmin, Notepad++, Laravel」을 사용하여 만들었습니다.
- Project 02를 보완하여 매입,매출,기간조회 등의 기본적인 기능뿐만 아니라 원형 그래프를 사용하여 시각적인 매출입 확인이 가능합니다.
- 데이터베이스를 활용하여 소분류 / 대분류로 더욱 상세한 제품 검색이 가능합니다.
- 데이터베이스의 기간 테이블을 월/일/시간으로 자세히 구성하여 더욱 상세한 검색이 가능합니다.
- Excel 파일로 기간별 매출입 현황을 다운로드 받을 수 있습니다.
- 데이터베이스의 다양한 활용법 및 그래프, 차트 기능을 활용하는 방법을 배웠습니다."></div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone4.png');"
                data-title="Project 04" data-desc="이 프로젝트는 온라인 서점,도서관 관리 사이트입니다.
-『2025.10 - 2025.12』동안 진행한 프로젝트입니다.
-「PHP, Bootstrap, phpMyAdmin, Notepad++, Laravel」을 사용하여 만들었습니다.
- 기존의 Project 01~03의 프로젝트와는 다른 서점과 도서관에서 사용가능한 사이트입니다.
- 책,사용자,대출,반납,리뷰,추천 등을 관리 가능합니다.
- 테이블을 서로서로 모두 조인하여 관리하던 페이지에서 정보를 바꾸면 다른 페이지의 모든 정보가 알맞게 변경되는 등 사용하기 간편하도록 만들었습니다.
- 일반 직원 / 관리자(대표) 로 역할을 나누어 가능한 권한의 범위를 다르게 했습니다.
- 책의 평점 / 대출 수 / 리뷰 수를 기반으로 책을 추천하며 어떤 정보를 기반으로 추천할지에 대하여 간단한 코드의 수정으로 변경이 가능하도록 했습니다.
- 기존과는 다른 프로젝트를 하며, 다양한 기능과 디자인적인 부분에 대해 학습했습니다. 또한 2~3개만의 데이터베이스 테이블끼리 상호작용하는 것이 아닌 전체적으로 관계를 구성하여 활용하는 법을 배웠습니다.">
            </div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone5.png');"
                data-title="Project 05" data-desc="이 프로젝트는 서점 제품 및 판매 관리 프로그램입니다.
-『2024.12 - 2024.12』동안 진행한 프로젝트입니다.
-「Access 2016」을 사용하여 만들었습니다.
- 메인 폼을 접속한 후 로그인을 하면 제품 등록과 판매가 가능합니다.
- 기간을 설정하여 기간 별 제품의 판매 통계를 알 수 있습니다.
- 삭제 폼을 활용하여 내용의 일괄 삭제가 가능합니다.
- Access의 기본 개념(폼,테이블) 부터 쿼리, 로그인 기능, 매크로, 보고서(영수증)기능을 배웠습니다."></div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone6.png');"
                data-title="Project 06" data-desc="이 프로젝트는 계절, 요일, 월 등 시간 데이터 기반 전력 사용량 예측 모델 입니다.
-『2025.11 - 2025.12』동안 진행한 프로젝트입니다.
-「Colab, data set」를 사용하여 만들었습니다.
- 계절과 요일 / 계절과 월 / 요일과 월 과 같이 데이터 끼리 합쳐서 전력을 예측이 가능합니다.
- 여러 요소끼리 합쳐서 전력 사용량을 예측하여 예측 정확도를 높였습니다.
- 데이터 셋 파일들을 추가하여 상황이나 지역에 알맞게 예측 정확도를 높여서 사용이 가능합니다.
- 알고리즘과 AI학습의 기초가 되는 데이터 분석 및 모델 예측을 배웠습니다."></div>

            <div class="carousel__cell" style="background-image: url('assets/images/gallery/phone7.png');"
                data-title="Project 07" data-desc="이 프로젝트는 AI Helper 프로그램입니다.
-『2026.01 - 2026.02』동안 진행한 프로젝트입니다.
-「VS Code, Python, Streamlit, Google Gemini API, Google-Generativeai, fpdf」를 사용하여 만들었습니다.
- 이미지 생성 기반, 일반 문답형 기반으로 선택해서 프롬포트를 생성할 수 있습니다.
- 생성된 답변과 프롬포트를 .txt파일 형식으로 다운로드 가능합니다.
- 지급받은 API를 활용하여 AI기능을 사용하고 어떠한 방식, 구조로 AI가 작동하는지에 대해 배웠습니다."></div>
        </div>
    </div>

    <div id="detail-view" class="detail-view">
        <div class="detail-content">
            <div class="detail-image" id="detail-img"></div>
            <div class="detail-info">
                <h2 id="detail-title">프로젝트 제목</h2>
                <div class="divider"></div>
                <p id="detail-description" class="detail-description">상세 설명이 여기에 표시됩니다.</p>
                <button onclick="closeDetail()" class="close-btn">BACK TO GALLERY</button>
            </div>
        </div>
    </div>

    <script src="src/gallery.js"></script>
</body>

</html>
